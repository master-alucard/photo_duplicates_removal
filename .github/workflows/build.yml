name: Build Windows Installer

# Trigger on any version tag (e.g. v1.0.0, v1.2.3)
on:
  push:
    tags:
      - "v*"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # required to create GitHub Releases and upload assets
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      # Pin to 3.12 — PyInstaller does not yet support 3.13+
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Install all dependencies (including rawpy) ────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 4. Verify rawpy + LibRaw DLL are importable ──────────────────────────
      - name: Verify rawpy installation
        run: |
          python -c "import rawpy; print('rawpy OK —', rawpy.__version__)"
          python -c "from PIL import Image; import imagehash, piexif, pywt; print('Core deps OK')"

      # ── 4b. Run test suite ────────────────────────────────────────────────────
      - name: Install test extras
        run: pip install pytest pytest-github-actions-annotate-failures

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

      # ── 5. Bundle with PyInstaller ───────────────────────────────────────────
      - name: Build EXE with PyInstaller
        run: pyinstaller image_deduper.spec

      # ── 6. Verify the EXE was produced ───────────────────────────────────────
      - name: Check output
        run: |
          if (!(Test-Path "dist\ImageDeduper\ImageDeduper.exe")) {
            Write-Error "ImageDeduper.exe not found — PyInstaller build failed"
            exit 1
          }
          Write-Host "ImageDeduper.exe found — $(Get-Item dist\ImageDeduper\ImageDeduper.exe | Select-Object -ExpandProperty Length) bytes"

      # ── 7. Install Inno Setup ─────────────────────────────────────────────────
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # ── 8. Extract version from the tag (strips leading "v") ─────────────────
      - name: Get version from tag
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      # ── 9. Patch the installer version in installer.iss ───────────────────────
      - name: Patch version in installer.iss
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          (Get-Content installer\installer.iss) `
            -replace '#define AppVersion\s+"[^"]+"', "#define AppVersion `"$ver`"" |
            Set-Content installer\installer.iss
          Write-Host "installer.iss patched to version $ver"

      # ── 9b. Patch the in-app version string in about_tab.py ──────────────────
      - name: Patch version in about_tab.py
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          (Get-Content about_tab.py) `
            -replace 'APP_VERSION\s*=\s*"[^"]+"', "APP_VERSION   = `"$ver`"" |
            Set-Content about_tab.py
          Write-Host "about_tab.py patched to version $ver"

      # ── 10. Build the installer ───────────────────────────────────────────────
      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ── 11. Rename installer to include version in filename ───────────────────
      - name: Rename installer
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $src = Get-ChildItem installer\installer_output\*.exe | Select-Object -First 1
          $dst = "installer\installer_output\ImageDeduper-Setup-$ver.exe"
          Move-Item $src.FullName $dst
          Write-Host "Installer: $dst"

      # ── 12. Upload installer as a build artifact ──────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageDeduper-Setup-${{ steps.version.outputs.VERSION }}
          path: installer\installer_output\*.exe
          retention-days: 90

      # ── 13. Create GitHub Release and attach the installer ────────────────────
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Image Deduper ${{ steps.version.outputs.VERSION }}"
          body: |
            ## What's new in ${{ steps.version.outputs.VERSION }}

            ### 🎯 Major Accuracy Overhaul — Far Fewer False Matches
            - **Night-sky and low-detail photos no longer wrongly grouped** — images that are mostly one colour (night shots, dark frames, near-blank scans) used to chain together because the perceptual hash collapses on them. A new low-detail detector switches to gradient comparison and disables rotation matching for these images, so visually different shots (the moon in different positions, for example) stay in separate groups.
            - **Burst sequences split correctly** — consecutive shots of the same scene taken seconds apart are no longer merged into one oversized group; each shot keeps its own true duplicate.
            - **RAW + JPEG pairing rebuilt** — cross-format duplicate detection is tighter and more accurate. RAW files now hash from the camera's embedded preview by default, which is dramatically faster and matches the companion JPEG precisely.
            - **Automatic settings repair** — stale internal settings from older versions that could silently weaken detection are now corrected automatically on first launch.

            ### 🎬 Video Scanning
            - **Much faster re-scans** — video fingerprints are cached, so rescanning a folder skips re-extracting frames from unchanged videos.
            - **Parallel frame extraction** — videos are processed with bounded concurrency for a clear speed-up.
            - **Robust against bad files** — corrupt, zero-byte and very short videos are handled gracefully instead of stalling the scan, with a per-file timeout to prevent hangs.
            - **Video thumbnails in the report** — the HTML report now shows a real frame for each video instead of a placeholder.

            ### ✨ UI Polish & Animations
            - **Live scan feedback** — a subtle pulsing indicator and a phase-transition highlight show the scan is working.
            - **Smoother results** — the results summary slides in on completion, key stats are colour-tinted, and buttons give press feedback.
            - **Animated tab indicator** and **keyboard focus rings** for clearer navigation.
            - **Polished empty states** across the Scan, Compare and History tabs.

            ### 🐛 Fixes
            - Fixed a crash when the "update available" prompt appeared on startup.
            - Scan progress row now renders correctly in both light and dark themes.

            ---

            ## Installation
            Download **ImageDeduper-Setup-${{ steps.version.outputs.VERSION }}.exe** below and run it.

            **Includes:** Python runtime and all dependencies (Pillow, imagehash, rawpy + LibRaw, piexif, PyWavelets, NumPy, SciPy) — no separate Python installation needed.
          files: installer\installer_output\*.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
